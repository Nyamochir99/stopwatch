<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stopwatch</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="content">
      <div class="times">
        <span class="timer" id="timer">00:00:00</span>
        <span class="mil-sec" id="mil-sec">.00</span>
      </div>
      <div class="buttons">
        <div class="reset" id="reset">Reset</div>
        <div class="start" id="start">Start</div>
        <div class="stop" id="stop">Stop</div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
